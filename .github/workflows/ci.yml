name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system cairo (cairosvg runtime dependency)
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Run tests
        run: uv run --group dev pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Run pre-commit (ruff lint + format)
        run: uvx pre-commit run --all-files --show-diff-on-failure
